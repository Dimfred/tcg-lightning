<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Open Graph (shared defaults — pages override og:title, og:description, og:url, og:image via <svelte:head>) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TCG Lightning" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Organization structured data with search logo -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TCG Lightning",
        "url": "https://tcg-lightning.com",
        "description": "Free Magic: The Gathering deck builder for Windows, macOS, and Linux with AI assistance, EDHREC synergies, and combo detection.",
        "logo": {
          "@type": "ImageObject",
          "url": "https://tcg-lightning.com/logo_search.webp",
          "width": 512,
          "height": 512
        },
        "sameAs": [
          "https://discord.gg/vGpqEcxzRG",
          "https://github.com/dimfred/tcg-lightning"
        ]
      }
    </script>

    <!-- WebSite structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TCG Lightning",
        "url": "https://tcg-lightning.com",
        "description": "Free Magic: The Gathering deck builder with AI assistance, EDHREC synergies, combo detection, and offline Scryfall search.",
        "publisher": {
          "@type": "Organization",
          "name": "TCG Lightning",
          "url": "https://tcg-lightning.com"
        }
      }
    </script>

    <!-- Privacy-friendly analytics by Plausible -->
    <script defer src="https://plausible.tcg-lightning.com/js/pa-k3aqS3aVxi0VNa16kpWpw.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
